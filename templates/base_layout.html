{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Webcam Studio{% endblock %}</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Lora:wght@500&display=swap" rel="stylesheet">
    
    <!-- Main CSS -->
    <link rel="stylesheet" href="{% static 'style.css' %}">
    
    {% block extra_head %}{% endblock %}
</head>
<body>

    <!-- Navigation / Header -->
    <nav class="main-nav">
        <div class="nav-brand">Webcam Studio</div>
        <div class="nav-links">
            <a href="{% url 'home' %}">Home</a>
            <!-- You can add more global links here -->
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="main-footer">
        <p>&copy; 2026 Webcam Studio. All rights reserved.</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
